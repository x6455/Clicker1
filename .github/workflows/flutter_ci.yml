name: Flutter APK Builder

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable

      # 🔥 CRITICAL FIX STEP
      - name: Repair Flutter project structure
        run: |
          flutter config --no-analytics
          flutter clean
          rm -rf .dart_tool
          rm -rf build
          flutter pub get

      # 🔥 FORCE regenerate Android metadata (safe version)
      - name: Recreate Flutter Android wiring
        run: flutter create . --platforms=android --overwrite

      - name: Verify Flutter setup
        run: flutter doctor -v

      - name: Build APK (verbose)
        run: flutter build apk --release -v

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: starterapp-release
          path: build/app/outputs/flutter-apk/app-release.apk
