name: Flutter APK Builder

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: stable

      - name: Flutter Doctor
        run: flutter doctor -v

      # 🔥 IMPORTANT: ensure clean Android + rebuild metadata
      - name: Fix Android project + clean
        run: |
          flutter clean
          rm -rf android/.gradle
          rm -rf build
          flutter pub get

      - name: Regenerate Android (fix v1 embedding issues)
        run: flutter create .

      - name: Generate Localizations
        run: flutter gen-l10n

      - name: Show dependencies
        run: flutter pub deps

      - name: Build APK (verbose)
        run: flutter build apk --release -v

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
